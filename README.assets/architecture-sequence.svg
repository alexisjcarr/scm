    <polygon points="420,310 438,302 438,318" />

    <line x1="420" y1="340" x2="145" y2="340" />
    <polygon points="145,340 163,332 163,348" />

    <line x1="1030" y1="400" x2="420" y2="400" />
    <polygon points="420,400 438,392 438,408" />

    <line x1="1030" y1="440" x2="420" y2="440" />
    <polygon points="420,440 438,432 438,448" />

    <line x1="1030" y1="480" x2="420" y2="480" />
    <polygon points="420,480 438,472 438,488" />

    <line x1="420" y1="520" x2="730" y2="520" />
    <polygon points="730,520 712,512 712,528" />

    <line x1="730" y1="550" x2="420" y2="550" />
    <polygon points="420,550 438,542 438,558" />

    <line x1="420" y1="580" x2="1030" y2="580" />
    <polygon points="1030,580 1012,572 1012,588" />

    <line x1="1030" y1="640" x2="1315" y2="640" />
    <polygon points="1315,640 1297,632 1297,648" />

    <line x1="1030" y1="700" x2="1630" y2="700" />
    <polygon points="1630,700 1612,692 1612,708" />

    <line x1="1630" y1="740" x2="1030" y2="740" />
    <polygon points="1030,740 1048,732 1048,748" />

    <line x1="1030" y1="800" x2="420" y2="800" />
    <polygon points="420,800 438,792 438,808" />

    <line x1="420" y1="840" x2="730" y2="840" />
    <polygon points="730,840 712,832 712,848" />

    <line x1="1030" y1="870" x2="1315" y2="870" />
    <polygon points="1315,870 1297,862 1297,878" />

    <line x1="1030" y1="900" x2="1315" y2="900" />
    <polygon points="1315,900 1297,892 1297,908" />
  </g>

  <!-- message labels -->
  <g fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="18">
    <text x="205" y="152">SubmitApply(manifest)</text>
    <text x="470" y="198">assign apply_id</text>
    <text x="450" y="262">persist apply + work items + events</text>
    <text x="510" y="296">ack persisted apply</text>
    <text x="245" y="332">apply_id</text>

    <text x="790" y="392">RegisterAgent</text>
    <text x="815" y="432">Heartbeat</text>
    <text x="820" y="472">FetchWork</text>
    <text x="445" y="512">claim one pending work item with lease</text>
    <text x="505" y="542">ack claimed work</text>
    <text x="610" y="572">FetchWorkResponse(work item + manifest)</text>

    <text x="1080" y="632">write current-work.json</text>
    <text x="1135" y="692">reconcile ordered resources</text>
    <text x="1160" y="764">changed / already converged</text>
    <text x="560" y="792">ReportWorkStatus(events, terminal state)</text>
    <text x="450" y="832">persist work status + event stream</text>
    <text x="1085" y="862">write last-result.json</text>
    <text x="1070" y="892">remove current-work.json</text>
  </g>

</svg>
