<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="980" viewBox="0 0 1560 980">
  <rect x="0" y="0" width="1560" height="980" fill="#ffffff" />

  <!-- top participant boxes -->
  <g fill="#eef2f7" stroke="#4b5563" stroke-width="2">
    <rect x="40" y="30" width="220" height="82" rx="12" />
    <rect x="300" y="30" width="290" height="82" rx="12" />
    <rect x="630" y="30" width="270" height="82" rx="12" />
    <rect x="940" y="30" width="270" height="82" rx="12" />
    <rect x="1240" y="30" width="300" height="82" rx="12" />
  </g>

  <!-- bottom participant boxes -->
  <g fill="#eef2f7" stroke="#4b5563" stroke-width="2">
    <rect x="40" y="868" width="220" height="82" rx="12" />
    <rect x="300" y="868" width="290" height="82" rx="12" />
    <rect x="630" y="868" width="270" height="82" rx="12" />
    <rect x="940" y="868" width="270" height="82" rx="12" />
    <rect x="1240" y="868" width="300" height="82" rx="12" />
  </g>

  <!-- box labels -->
  <g fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="500" text-anchor="middle">
    <text x="150" y="52">
      <tspan x="150" dy="0">scmctl</tspan>
      <tspan x="150" dy="22">(operator)</tspan>
    </text>
    <text x="445" y="52">
      <tspan x="445" dy="0">scmctld</tspan>
      <tspan x="445" dy="22">(control plane)</tspan>
    </text>
    <text x="765" y="52">
      <tspan x="765" dy="0">system</tspan>
      <tspan x="765" dy="22">durable state</tspan>
    </text>
    <text x="1075" y="79">scmctld-agent</text>
    <text x="1390" y="52">
      <tspan x="1390" dy="0">host runtime</tspan>
      <tspan x="1390" dy="22">(packages / files / services)</tspan>
    </text>

    <text x="150" y="890">
      <tspan x="150" dy="0">scmctl</tspan>
      <tspan x="150" dy="22">(operator)</tspan>
    </text>
    <text x="445" y="890">
      <tspan x="445" dy="0">scmctld</tspan>
      <tspan x="445" dy="22">(control plane)</tspan>
    </text>
    <text x="765" y="890">
      <tspan x="765" dy="0">system</tspan>
      <tspan x="765" dy="22">durable state</tspan>
    </text>
    <text x="1075" y="917">scmctld-agent</text>
    <text x="1390" y="890">
      <tspan x="1390" dy="0">host runtime</tspan>
      <tspan x="1390" dy="22">(packages / files / services)</tspan>
    </text>
  </g>

  <!-- lifelines -->
  <g stroke="#9ca3af" stroke-width="2">
    <line x1="150" y1="112" x2="150" y2="868" />
    <line x1="445" y1="112" x2="445" y2="868" />
    <line x1="765" y1="112" x2="765" y2="868" />
    <line x1="1075" y1="112" x2="1075" y2="868" />
    <line x1="1390" y1="112" x2="1390" y2="868" />
  </g>

  <!-- loop box -->
  <rect x="560" y="270" width="650" height="160" rx="18" fill="#eff6ff" fill-opacity="0.55" stroke="#2563eb" stroke-width="3" />
  <text x="582" y="298" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="18">loop: register / heartbeat / FetchWork</text>

  <!-- arrows -->
  <g stroke="#111827" stroke-width="3" fill="#111827">
    <line x1="150" y1="170" x2="445" y2="170" />
    <polygon points="445,170 427,162 427,178" />

    <line x1="445" y1="230" x2="765" y2="230" />
    <polygon points="765,230 747,222 747,238" />

    <line x1="765" y1="260" x2="445" y2="260" />
    <polygon points="445,260 463,252 463,268" />

    <line x1="445" y1="330" x2="1075" y2="330" />
    <polygon points="1075,330 1057,322 1057,338" />

    <line x1="445" y1="360" x2="765" y2="360" />
    <polygon points="765,360 747,352 747,368" />

    <line x1="765" y1="390" x2="445" y2="390" />
    <polygon points="445,390 463,382 463,398" />

    <line x1="1075" y1="470" x2="1390" y2="470" />
    <polygon points="1390,470 1372,462 1372,478" />

    <line x1="1390" y1="500" x2="1075" y2="500" />
    <polygon points="1075,500 1093,492 1093,508" />

    <line x1="1075" y1="570" x2="765" y2="570" />
    <polygon points="765,570 783,562 783,578" />

    <line x1="1075" y1="640" x2="445" y2="640" />
    <polygon points="445,640 463,632 463,648" />

    <line x1="445" y1="670" x2="765" y2="670" />
    <polygon points="765,670 747,662 747,678" />

    <line x1="1075" y1="720" x2="765" y2="720" />
    <polygon points="765,720 783,712 783,728" />

    <line x1="1075" y1="750" x2="765" y2="750" />
    <polygon points="765,750 783,742 783,758" />
  </g>

  <!-- message labels -->
  <g fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="18">
    <text x="205" y="152">SubmitApply(manifest)</text>
    <text x="470" y="212">persist apply + work items + events</text>
    <text x="560" y="246">apply_id</text>
    <text x="810" y="348">claim one pending work item</text>
    <text x="810" y="372">with lease token</text>
    <text x="520" y="408">work item + manifest</text>
    <text x="1115" y="452">reconcile ordered resources</text>
    <text x="1125" y="524">changed / already converged</text>
    <text x="825" y="552">write current-work.json</text>
    <text x="640" y="622">ReportWorkStatus(events, terminal state)</text>
    <text x="470" y="692">persist work status + event stream</text>
    <text x="835" y="708">write last-result.json</text>
    <text x="820" y="778">remove current-work.json</text>
  </g>
</svg>
