<svg xmlns="http://www.w3.org/2000/svg" width="1820" height="1020" viewBox="0 0 1820 1020">
  <rect x="0" y="0" width="1820" height="1020" fill="#ffffff" />

  <!-- participant boxes -->
  <g fill="#eef2f7" stroke="#4b5563" stroke-width="2">
    <rect x="40" y="30" width="210" height="82" rx="12" />
    <rect x="290" y="30" width="260" height="82" rx="12" />
    <rect x="590" y="30" width="280" height="82" rx="12" />
    <rect x="910" y="30" width="240" height="82" rx="12" />
    <rect x="1190" y="30" width="250" height="82" rx="12" />
    <rect x="1480" y="30" width="300" height="82" rx="12" />

    <rect x="40" y="908" width="210" height="82" rx="12" />
    <rect x="290" y="908" width="260" height="82" rx="12" />
    <rect x="590" y="908" width="280" height="82" rx="12" />
    <rect x="910" y="908" width="240" height="82" rx="12" />
    <rect x="1190" y="908" width="250" height="82" rx="12" />
    <rect x="1480" y="908" width="300" height="82" rx="12" />
  </g>

  <!-- labels -->
  <g fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="500" text-anchor="middle">
    <text x="145" y="52">
      <tspan x="145" dy="0">scmctl</tspan>
      <tspan x="145" dy="22">(operator)</tspan>
    </text>
    <text x="420" y="52">
      <tspan x="420" dy="0">scmctld</tspan>
      <tspan x="420" dy="22">(control plane)</tspan>
    </text>
    <text x="730" y="52">
      <tspan x="730" dy="0">system</tspan>
      <tspan x="730" dy="22">durable state</tspan>
    </text>
    <text x="1030" y="79">scmctld-agent</text>
    <text x="1315" y="52">
      <tspan x="1315" dy="0">local checkpoints</tspan>
      <tspan x="1315" dy="22">(current-work / last-result)</tspan>
    </text>
    <text x="1630" y="52">
      <tspan x="1630" dy="0">host runtime</tspan>
      <tspan x="1630" dy="22">(packages / files / services)</tspan>
    </text>

    <text x="145" y="930">
      <tspan x="145" dy="0">scmctl</tspan>
      <tspan x="145" dy="22">(operator)</tspan>
    </text>
    <text x="420" y="930">
      <tspan x="420" dy="0">scmctld</tspan>
      <tspan x="420" dy="22">(control plane)</tspan>
    </text>
    <text x="730" y="930">
      <tspan x="730" dy="0">system</tspan>
      <tspan x="730" dy="22">durable state</tspan>
    </text>
    <text x="1030" y="957">scmctld-agent</text>
    <text x="1315" y="930">
      <tspan x="1315" dy="0">local checkpoints</tspan>
      <tspan x="1315" dy="22">(current-work / last-result)</tspan>
    </text>
    <text x="1630" y="930">
      <tspan x="1630" dy="0">host runtime</tspan>
      <tspan x="1630" dy="22">(packages / files / services)</tspan>
    </text>
  </g>

  <!-- lifelines -->
  <g stroke="#9ca3af" stroke-width="2">
    <line x1="145" y1="112" x2="145" y2="908" />
    <line x1="420" y1="112" x2="420" y2="908" />
    <line x1="730" y1="112" x2="730" y2="908" />
    <line x1="1030" y1="112" x2="1030" y2="908" />
    <line x1="1315" y1="112" x2="1315" y2="908" />
    <line x1="1630" y1="112" x2="1630" y2="908" />
  </g>

  <!-- loop box -->
  <rect x="860" y="340" width="560" height="240" rx="18" fill="#eff6ff" fill-opacity="0.55" stroke="#2563eb" stroke-width="3" />
  <text x="882" y="368" fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="18">loop: register / heartbeat / FetchWork</text>

  <!-- arrows -->
  <g stroke="#111827" stroke-width="3" fill="#111827">
    <line x1="145" y1="170" x2="420" y2="170" />
    <polygon points="420,170 402,162 402,178" />

    <path d="M 420 205 C 470 205, 470 245, 420 245" fill="none" />
    <polygon points="420,245 438,237 438,253" />

    <line x1="420" y1="280" x2="730" y2="280" />
